services:
  db:
    image: postgres:16
    container_name: postgres-sandbox-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sandbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sandbox}
      POSTGRES_DB: ${POSTGRES_DB:-sandbox}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sandbox} -d ${POSTGRES_DB:-sandbox}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: postgres-sandbox-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sandbox:sandbox@db:5432/sandbox}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:15173}
      DEFAULT_PROVIDER: ${DEFAULT_PROVIDER:-openai}
      OPENAI__API_KEY: ${OPENAI__API_KEY:-}
      OPENAI__DEFAULT_MODEL: ${OPENAI__DEFAULT_MODEL:-gpt-4o-mini}
      OPENAI__BASE_URL: ${OPENAI__BASE_URL:-}
      AZURE__API_KEY: ${AZURE__API_KEY:-}
      AZURE__ENDPOINT: ${AZURE__ENDPOINT:-}
      AZURE__API_VERSION: ${AZURE__API_VERSION:-2024-02-15-preview}
      AZURE__DEFAULT_MODEL: ${AZURE__DEFAULT_MODEL:-gpt-4o-mini}
      ANTHROPIC__API_KEY: ${ANTHROPIC__API_KEY:-}
      ANTHROPIC__DEFAULT_MODEL: ${ANTHROPIC__DEFAULT_MODEL:-claude-3-5-haiku-latest}
      OPENROUTER__API_KEY: ${OPENROUTER__API_KEY:-}
      OPENROUTER__BASE_URL: ${OPENROUTER__BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER__DEFAULT_MODEL: ${OPENROUTER__DEFAULT_MODEL:-openai/gpt-4o-mini}
      LM_STUDIO__BASE_URL: ${LM_STUDIO__BASE_URL:-http://host.docker.internal:1234/v1}
      LM_STUDIO__DEFAULT_MODEL: ${LM_STUDIO__DEFAULT_MODEL:-local-model}
      LLM_AGENT_MAX_STEPS: ${LLM_AGENT_MAX_STEPS:-10}
      LLM_PREVIEW_LIMIT: ${LLM_PREVIEW_LIMIT:-20}
    ports:
      - "${BACKEND_HOST_PORT:-18000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: postgres-sandbox-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18000}
    ports:
      - "${FRONTEND_HOST_PORT:-15173}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
